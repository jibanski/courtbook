<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Court lines faint -->
  <rect x="70" y="35" width="260" height="150" rx="2" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="70" y1="110" x2="330" y2="110" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Shuttlecock cork -->
  <ellipse cx="200" cy="130" rx="14" ry="11" fill="#f5e6c8"/>
  <!-- Feather lines spreading upward -->
  <line x1="200" y1="119" x2="200" y2="52" stroke="rgba(255,255,255,0.75)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="119" x2="180" y2="55" stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="119" x2="162" y2="66" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="200" y1="119" x2="220" y2="55" stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="119" x2="238" y2="66" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="200" y1="119" x2="148" y2="82" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="119" x2="252" y2="82" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Feather rim oval -->
  <ellipse cx="200" cy="60" rx="52" ry="12" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="198" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">BADMINTON</text>
</svg>
