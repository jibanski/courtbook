<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#134e4a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Table surface -->
  <rect x="60" y="95" width="280" height="80" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Net -->
  <line x1="200" y1="88" x2="200" y2="175" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="185" y1="88" x2="215" y2="88" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <!-- Table center line -->
  <line x1="60" y1="135" x2="340" y2="135" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Paddle (left) -->
  <ellipse cx="130" cy="100" rx="30" ry="26" fill="#dc2626" opacity="0.9"/>
  <ellipse cx="130" cy="100" rx="24" ry="20" fill="#dc2626"/>
  <ellipse cx="130" cy="100" rx="18" ry="14" fill="#b91c1c" opacity="0.5"/>
  <!-- Paddle handle -->
  <rect x="120" y="122" width="20" height="36" rx="5" fill="#92400e"/>
  <!-- Paddle (right, lighter) -->
  <ellipse cx="270" cy="100" rx="30" ry="26" fill="#1d4ed8" opacity="0.85"/>
  <ellipse cx="270" cy="100" rx="18" ry="14" fill="#1e40af" opacity="0.5"/>
  <rect x="260" y="122" width="20" height="36" rx="5" fill="#92400e"/>
  <!-- Ball -->
  <circle cx="200" cy="72" r="14" fill="white" opacity="0.9"/>
  <ellipse cx="195" cy="67" rx="5" ry="3.5" fill="rgba(255,255,255,0.6)" transform="rotate(-20,195,67)"/>
  <!-- Label -->
  <text x="200" y="204" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">TABLE TENNIS</text>
</svg>
