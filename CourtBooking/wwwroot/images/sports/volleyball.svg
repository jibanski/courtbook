<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <radialGradient id="ball" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <clipPath id="vClip">
      <circle cx="200" cy="100" r="52"/>
    </clipPath>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Net line -->
  <line x1="60" y1="138" x2="340" y2="138" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- Shadow -->
  <ellipse cx="200" cy="163" rx="55" ry="8" fill="rgba(0,0,0,0.25)"/>
  <!-- Volleyball -->
  <circle cx="200" cy="100" r="52" fill="url(#ball)"/>
  <g clip-path="url(#vClip)">
    <!-- Panel curves -->
    <path d="M 200 48 Q 230 74 200 100 Q 170 74 200 48" fill="rgba(255,255,255,0.18)" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
    <path d="M 148 100 Q 174 70 200 100 Q 174 130 148 100" fill="rgba(255,255,255,0.1)" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
    <path d="M 252 100 Q 226 70 200 100 Q 226 130 252 100" fill="rgba(255,255,255,0.1)" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
    <path d="M 200 152 Q 230 126 200 100 Q 170 126 200 152" fill="rgba(0,0,0,0.08)" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  </g>
  <!-- Highlight -->
  <ellipse cx="182" cy="78" rx="12" ry="8" fill="rgba(255,255,255,0.18)" transform="rotate(-20,182,78)"/>
  <!-- Label -->
  <text x="200" y="198" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">VOLLEYBALL</text>
</svg>
