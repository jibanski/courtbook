<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#713f12"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Court lines -->
  <rect x="65" y="45" width="270" height="145" rx="3" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Kitchen/NVZ line -->
  <line x1="65" y1="115" x2="335" y2="115" stroke="rgba(255,255,255,0.1)" stroke-width="1.5"/>
  <!-- Net -->
  <line x1="65" y1="82" x2="335" y2="82" stroke="rgba(255,255,255,0.18)" stroke-width="2.5"/>
  <!-- Paddle -->
  <g transform="rotate(-30, 185, 115)">
    <!-- Paddle face -->
    <rect x="155" y="68" width="60" height="72" rx="14" fill="rgba(255,255,255,0.88)"/>
    <!-- Holes pattern on paddle -->
    <circle cx="170" cy="83" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="185" cy="83" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="200" cy="83" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="170" cy="96" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="185" cy="96" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="200" cy="96" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="170" cy="109" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="185" cy="109" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <circle cx="200" cy="109" r="3.5" fill="rgba(0,0,0,0.18)"/>
    <!-- Handle -->
    <rect x="171" y="138" width="28" height="42" rx="7" fill="#92400e"/>
    <rect x="174" y="140" width="22" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="174" y="148" width="22" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>
  <!-- Ball (perforated) -->
  <circle cx="262" cy="78" r="22" fill="#f5e642" opacity="0.92"/>
  <circle cx="253" cy="70" r="4" fill="rgba(0,0,0,0.2)"/>
  <circle cx="265" cy="68" r="4" fill="rgba(0,0,0,0.2)"/>
  <circle cx="274" cy="76" r="4" fill="rgba(0,0,0,0.2)"/>
  <circle cx="270" cy="87" r="4" fill="rgba(0,0,0,0.2)"/>
  <circle cx="257" cy="88" r="4" fill="rgba(0,0,0,0.2)"/>
  <circle cx="248" cy="80" r="4" fill="rgba(0,0,0,0.2)"/>
  <ellipse cx="256" cy="66" rx="7" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-20,256,66)"/>
  <!-- Label -->
  <text x="200" y="204" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">PICKLEBALL</text>
</svg>
