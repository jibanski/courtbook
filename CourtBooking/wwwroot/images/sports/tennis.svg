<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="ball" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4ed44"/>
      <stop offset="100%" stop-color="#9db820"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Court lines faint -->
  <rect x="60" y="40" width="280" height="140" rx="2" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="200" y1="40" x2="200" y2="180" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <line x1="60" y1="110" x2="340" y2="110" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Tennis ball -->
  <circle cx="200" cy="100" r="48" fill="url(#ball)" opacity="0.92"/>
  <!-- Seam -->
  <path d="M 162 82 Q 200 100 162 118" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 238 82 Q 200 100 238 118" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Label -->
  <text x="200" y="198" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">TENNIS</text>
</svg>
