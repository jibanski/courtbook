<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Trophy cup -->
  <path d="M 175 55 L 225 55 L 225 120 Q 225 145 200 150 Q 175 145 175 120 Z" fill="rgba(163,255,18,0.25)" stroke="rgba(163,255,18,0.5)" stroke-width="2"/>
  <!-- Trophy handles -->
  <path d="M 175 70 Q 148 70 148 95 Q 148 115 175 112" fill="none" stroke="rgba(163,255,18,0.45)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 225 70 Q 252 70 252 95 Q 252 115 225 112" fill="none" stroke="rgba(163,255,18,0.45)" stroke-width="3" stroke-linecap="round"/>
  <!-- Trophy base stem -->
  <rect x="192" y="150" width="16" height="18" rx="2" fill="rgba(163,255,18,0.3)" stroke="rgba(163,255,18,0.4)" stroke-width="1.5"/>
  <!-- Trophy base -->
  <rect x="170" y="166" width="60" height="10" rx="3" fill="rgba(163,255,18,0.3)" stroke="rgba(163,255,18,0.4)" stroke-width="1.5"/>
  <!-- Star inside trophy -->
  <polygon points="200,72 204,84 216,84 207,92 210,104 200,97 190,104 193,92 184,84 196,84" fill="rgba(163,255,18,0.6)"/>
  <!-- Label -->
  <text x="200" y="204" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">SPORTS COURT</text>
</svg>
