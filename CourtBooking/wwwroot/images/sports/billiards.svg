<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <radialGradient id="ball8" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <radialGradient id="ballR" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </radialGradient>
    <radialGradient id="ballY" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="ballB" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Table felt -->
  <rect x="55" y="50" width="290" height="130" rx="8" fill="rgba(21,128,61,0.35)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <!-- Pocket circles -->
  <circle cx="67" cy="62" r="7" fill="rgba(0,0,0,0.5)"/>
  <circle cx="333" cy="62" r="7" fill="rgba(0,0,0,0.5)"/>
  <circle cx="67" cy="168" r="7" fill="rgba(0,0,0,0.5)"/>
  <circle cx="333" cy="168" r="7" fill="rgba(0,0,0,0.5)"/>
  <circle cx="200" cy="55" r="6" fill="rgba(0,0,0,0.5)"/>
  <circle cx="200" cy="175" r="6" fill="rgba(0,0,0,0.5)"/>
  <!-- Balls triangle arrangement -->
  <!-- Row 1 (apex) -->
  <circle cx="245" cy="110" r="18" fill="url(#ballY)"/>
  <!-- Row 2 -->
  <circle cx="229" cy="98" r="18" fill="url(#ballR)"/>
  <circle cx="261" cy="98" r="18" fill="url(#ballB)"/>
  <!-- Row 3 -->
  <circle cx="212" cy="86" r="18" fill="white" opacity="0.9"/>
  <circle cx="245" cy="86" r="18" fill="url(#ball8)"/>
  <circle cx="278" cy="86" r="18" fill="url(#ballR)"/>
  <!-- 8 ball label -->
  <circle cx="245" cy="86" r="9" fill="white" opacity="0.9"/>
  <text x="245" y="90" text-anchor="middle" fill="#111" font-family="Arial" font-size="10" font-weight="900">8</text>
  <!-- Cue ball -->
  <circle cx="145" cy="110" r="20" fill="white" opacity="0.92"/>
  <ellipse cx="138" cy="104" rx="7" ry="5" fill="rgba(255,255,255,0.5)" transform="rotate(-20,138,104)"/>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">BILLIARDS</text>
</svg>
