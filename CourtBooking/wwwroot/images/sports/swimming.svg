<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(56,189,248,0.5)"/>
      <stop offset="100%" stop-color="rgba(14,165,233,0.2)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg)"/>
  <!-- Lane lines -->
  <line x1="80" y1="60" x2="80" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="160" y1="60" x2="160" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="240" y1="60" x2="240" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="320" y1="60" x2="320" y2="175" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Pool water effect -->
  <rect x="60" y="60" width="280" height="115" rx="4" fill="url(#water)"/>
  <rect x="60" y="60" width="280" height="115" rx="4" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Wave lines -->
  <path d="M 70 90 Q 100 80 130 90 Q 160 100 190 90 Q 220 80 250 90 Q 280 100 310 90 Q 330 85 345 90" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 70 112 Q 100 102 130 112 Q 160 122 190 112 Q 220 102 250 112 Q 280 122 310 112 Q 330 107 345 112" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 70 134 Q 100 124 130 134 Q 160 144 190 134 Q 220 124 250 134 Q 280 144 310 134 Q 330 129 345 134" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="204" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="Arial,Helvetica,sans-serif" font-size="11" letter-spacing="4" font-weight="700">SWIMMING</text>
</svg>
